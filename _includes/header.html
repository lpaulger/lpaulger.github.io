<button type="button" class="theme-toggle" aria-label="Toggle color theme" onclick="(function(){var r=document.documentElement;var cur=r.getAttribute('data-theme');var sysDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;var isDark=cur?cur==='dark':sysDark;var next=isDark?'light':'dark';r.setAttribute('data-theme',next);try{localStorage.setItem('theme',next);}catch(e){}})()">
	<svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
	<svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
</button>

<aside class="logo">
	<a href="/">
		<img src="{{ site.baseurl }}/assets/profile.png" class="gravatar" alt="logo image">
	</a>

	<ul class="social">
		<li><a class="fa fa-2x fa-github" href="https://github.com/{{ site.github_username }}"><span class="description">View my GitHub profile</span></a></li>
		<li><a class="fa fa-2x fa-envelope" href="mailto:{{ site.email }}"><span class="description">Send me an Email</span></a></li>
		<li><a class="fa fa-2x fa-linkedin" href="https://linkedin.com/in/{{ site.linkedin_username }}"><span class="description">View my LinkedIn Profile</span></a></li>
	</ul>
</aside>
