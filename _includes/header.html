<aside class="logo">
	<a href="/">
		<img src="{{ site.baseurl }}/assets/profile.png" class="gravatar" alt="logo image">
	</a>

	<ul class="social">
		<li><a class="fa fa-2x fa-github" href="https://github.com/{{ site.github_username }}"><span class="description">View my GitHub profile</span></a></li>
		<li><a class="fa fa-2x fa-envelope" href="mailto:{{ site.email }}"><span class="description">Send me an Email</span></a></li>
		<li><a class="fa fa-2x fa-linkedin" href="https://linkedin.com/in/{{ site.linkedin_username }}"><span class="description">View my LinkedIn Profile</span></a></li>
	</ul>
</aside>
